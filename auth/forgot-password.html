<!-- forgot-password.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | Halo Marketplace</title>


<style>

* {
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body {

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f7fb;

}


.card {

    width:400px;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);

}


h1 {

    text-align:center;
    margin-bottom:10px;

}


p {

    text-align:center;
    color:#666;
    margin-bottom:25px;

}


input {

    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;

}


button {

    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#111827;
    color:white;
    cursor:pointer;

}


.message {

    text-align:center;
    margin-top:15px;

}


.success {

    color:green;

}


.error {

    color:red;

}


</style>

</head>


<body>


<div class="card">


<h1>
Reset Password
</h1>


<p>
Enter your email and we will send you a reset link.
</p>



<input
id="email"
type="email"
placeholder="Email address"
/>



<button onclick="resetPassword()">

Send Reset Link

</button>



<div id="message" class="message"></div>


</div>




<script type="module">


import { createClient } 
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";



const supabaseUrl =
"YOUR_SUPABASE_URL";


const supabaseKey =
"YOUR_SUPABASE_ANON_KEY";



const supabase =
createClient(
supabaseUrl,
supabaseKey
);




window.resetPassword = async function(){



const email =
document.getElementById("email").value;


const message =
document.getElementById("message");



if(!email){

message.className =
"message error";

message.innerHTML =
"Enter your email address.";

return;

}




const {
error
} =
await supabase.auth.resetPasswordForEmail(

email,

{

redirectTo:

"https://marketplace-2383.vercel.app/reset-password.html"

}

);





if(error){


message.className =
"message error";


message.innerHTML =
error.message;


return;


}





message.className =
"message success";


message.innerHTML =
"Reset link sent. Check your email.";





}



</script>


</body>

</html>
