<!-- vendors.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vendors | Halo Marketplace</title>


<style>

* {
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body {

    margin:0;
    background:#f5f7fb;

}


header {

    background:#111827;
    color:white;
    padding:25px;

}



.logo {

    font-size:28px;
    font-weight:bold;

}



.container {

    max-width:1200px;
    margin:auto;
    padding:40px 25px;

}



h1 {

    text-align:center;
    font-size:40px;

}



.subtitle {

    text-align:center;
    color:#666;
    margin-bottom:30px;

}



.search {

    display:flex;
    justify-content:center;
    margin-bottom:35px;

}



input {

    width:100%;
    max-width:500px;
    padding:15px;
    border-radius:10px;
    border:1px solid #ddd;

}



.vendors {

    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:25px;

}



.card {

    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    text-align:center;

}



.avatar {

    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;

}



.store {

    font-size:22px;
    font-weight:bold;
    margin-top:15px;

}



.badge {

    display:inline-block;
    margin-top:10px;
    background:#dcfce7;
    color:#166534;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;

}



.info {

    margin:15px 0;
    color:#555;

}



button {

    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#111827;
    color:white;
    cursor:pointer;

}



.empty {

    text-align:center;
    padding:40px;

}


</style>

</head>


<body>


<header>

<div class="logo">
Halo Marketplace
</div>

</header>




<div class="container">


<h1>
Trusted Vendors
</h1>


<div class="subtitle">
Discover verified sellers across Canada
</div>



<div class="search">

<input
id="search"
placeholder="Search vendors..."
onkeyup="searchVendors()"
/>

</div>




<div id="vendors" class="vendors"></div>



</div>





<script>


const vendors = [


{

id:1,

name:"Tech Canada Store",

location:"Alberta, Canada",

rating:"★★★★★",

products:120,

image:
"https://images.unsplash.com/photo-1525507119028-ed4c629a60a3"

},


{

id:2,

name:"NorthSky Electronics",

location:"Ontario, Canada",

rating:"★★★★★",

products:85,

image:
"https://images.unsplash.com/photo-1497366754035-f200968a6e72"

},


{

id:3,

name:"Home Makers",

location:"British Columbia, Canada",

rating:"★★★★☆",

products:45,

image:
"https://images.unsplash.com/photo-1556742049-0cfed4f6a45d"

}


];






function displayVendors(list){


const container =
document.getElementById("vendors");


container.innerHTML="";



if(list.length===0){

container.innerHTML =
`
<div class="empty">
No vendors found
</div>
`;

return;

}



list.forEach(vendor=>{


container.innerHTML +=

`

<div class="card">


<img 
class="avatar"
src="${vendor.image}"
>



<div class="store">
${vendor.name}
</div>



<div class="badge">
✔ Verified Vendor
</div>



<div class="info">

📍 ${vendor.location}

<br>

⭐ ${vendor.rating}

<br>

🛍 ${vendor.products} Products

</div>



<button onclick="viewVendor(${vendor.id})">

View Store

</button>


</div>

`;

});


}




function searchVendors(){


const value =

document
.getElementById("search")
.value
.toLowerCase();



const filtered = vendors.filter(v =>

v.name
.toLowerCase()
.includes(value)

);



displayVendors(filtered);


}





function viewVendor(id){


window.location.href =
"/vendor.html?id="+id;


}





displayVendors(vendors);



</script>


</body>

</html>
