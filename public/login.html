<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Halo Marketplace</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:Inter,sans-serif;

background:#f8fafc;

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

}



.card{

background:white;

width:100%;

max-width:430px;

padding:40px;

border-radius:25px;

box-shadow:0 20px 60px rgba(0,0,0,.1);

}



.logo{

font-size:34px;

font-weight:900;

margin-bottom:25px;

}


.logo span{

color:#2563eb;

}



h1{

font-size:32px;

margin-bottom:10px;

}



p{

color:#6b7280;

margin-bottom:25px;

}



input{

width:100%;

padding:15px;

margin-bottom:15px;

border:1px solid #e5e7eb;

border-radius:12px;

font-size:16px;

}



button{

width:100%;

padding:16px;

background:#2563eb;

color:white;

border:none;

border-radius:50px;

font-weight:700;

cursor:pointer;

}



button:hover{

background:#1d4ed8;

}



.links{

text-align:center;

margin-top:20px;

}



a{

color:#2563eb;

font-weight:700;

text-decoration:none;

}



.message{

margin-top:15px;

text-align:center;

}


</style>

</head>


<body>


<div class="card">


<div class="logo">

Halo<span>.</span>

</div>



<h1>
Welcome Back
</h1>


<p>
Login to your marketplace account.
</p>





<form id="loginForm">


<input

id="email"

type="email"

placeholder="Email address"

required

>




<input

id="password"

type="password"

placeholder="Password"

required

>



<button>

Login

</button>



</form>



<div class="message" id="message"></div>



<div class="links">


<a href="forgot-password.html">
Forgot Password?
</a>


<br><br>


Don't have an account?


<a href="register.html">
Create Account
</a>



</div>


</div>







<script>


const API_URL =
"/api/v1";



document

.getElementById("loginForm")

.addEventListener(

"submit",

async(e)=>{


e.preventDefault();




const email =

document.getElementById(
"email"
).value;



const password =

document.getElementById(
"password"
).value;



const message =

document.getElementById(
"message"
);






try{


const response =

await fetch(

`${API_URL}/auth/login`,

{


method:"POST",


headers:{


"Content-Type":
"application/json"


},


body:JSON.stringify({

email,

password

})


}

);





const data =

await response.json();






if(data.success){



localStorage.setItem(

"halo_token",

data.token

);





localStorage.setItem(

"halo_user",

JSON.stringify(
data.user
)

);





message.innerHTML =
"Login successful";





setTimeout(()=>{


window.location.href =

"dashboard.html";


},1000);





}else{


message.innerHTML =

data.message ||

"Login failed";


}




}


catch(error){


console.error(error);


message.innerHTML =
"Server error";


}



});


</script>


</body>

</html>
