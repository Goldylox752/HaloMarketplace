<!-- browse.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Browse Products | Halo Marketplace</title>


<style>

* {
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body {

    margin:0;
    background:#f5f7fb;

}



header {

    background:#111827;
    color:white;
    padding:20px;

}



.header-container {

    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;

}



.logo {

    font-size:24px;
    font-weight:bold;

}



.container {

    max-width:1200px;
    margin:auto;
    padding:30px;

}



.search-bar {

    display:flex;
    gap:10px;
    margin-bottom:25px;

}



input {

    flex:1;
    padding:15px;
    border-radius:10px;
    border:1px solid #ddd;

}



select {

    padding:15px;
    border-radius:10px;
    border:1px solid #ddd;

}



.products {

    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:25px;

}



.card {

    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.08);

}



.card img {

    width:100%;
    height:220px;
    object-fit:cover;

}



.content {

    padding:20px;

}



.title {

    font-size:18px;
    font-weight:bold;

}



.price {

    font-size:20px;
    font-weight:bold;
    margin:10px 0;

}



.badge {

    display:inline-block;
    background:#dcfce7;
    color:#166534;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;

}



button {

    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#111827;
    color:white;
    cursor:pointer;

}



.empty {

    text-align:center;
    padding:40px;

}

</style>

</head>


<body>


<header>

<div class="header-container">

<div class="logo">
Halo Marketplace
</div>


<div>
<a href="/sell.html" style="color:white;">
Sell
</a>
</div>

</div>

</header>




<div class="container">


<h1>
Browse Products
</h1>



<div class="search-bar">


<input
id="search"
placeholder="Search products..."
onkeyup="filterProducts()"
/>



<select id="category" onchange="filterProducts()">

<option value="">
All Categories
</option>

<option>
Electronics
</option>

<option>
Vehicles
</option>

<option>
Home
</option>

<option>
Fashion
</option>

<option>
Tools
</option>

</select>


</div>




<div id="products" class="products"></div>



</div>





<script>


let products = [


{

title:"iPhone 15 Pro",

category:"Electronics",

price:999,

image:
"https://images.unsplash.com/photo-1592286927505-1def25115558",

seller:"Verified Seller"

},


{

title:"Wooden Handmade Stool",

category:"Home",

price:75,

image:
"https://images.unsplash.com/photo-1598300042247-d088f8ab3a91",

seller:"Local Seller"

},


{

title:"DJI Drone",

category:"Tools",

price:650,

image:
"https://images.unsplash.com/photo-1508614589041-895b88991e3e",

seller:"Verified Seller"

}


];





function displayProducts(items){


const container =
document.getElementById("products");



container.innerHTML="";



if(items.length===0){


container.innerHTML =
`
<div class="empty">
No products found
</div>
`;

return;

}





items.forEach(product=>{


container.innerHTML +=

`

<div class="card">


<img src="${product.image}">



<div class="content">


<div class="title">
${product.title}
</div>


<div class="badge">
✔ ${product.seller}
</div>


<div class="price">
$${product.price}
</div>


<button onclick="viewProduct('${product.title}')">
View Product
</button>


</div>


</div>

`;


});


}





function filterProducts(){


let search =

document.getElementById("search")
.value
.toLowerCase();



let category =

document.getElementById("category")
.value;



let filtered = products.filter(product=>{


return (

product.title
.toLowerCase()
.includes(search)

&&

(category === "" ||
product.category === category)

);


});



displayProducts(filtered);


}




function viewProduct(title){


window.location.href =
"/product.html?name=" +
encodeURIComponent(title);


}





displayProducts(products);


</script>


</body>

</html>
