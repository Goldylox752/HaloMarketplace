<!-- contact.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Halo Marketplace</title>


<style>

* {
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body {

    margin:0;
    background:#f5f7fb;

}



header {

    background:#111827;
    color:white;
    padding:25px;

}


.logo {

    font-size:28px;
    font-weight:bold;

}



.container {

    max-width:1100px;
    margin:auto;
    padding:40px 25px;

}



h1 {

    text-align:center;
    font-size:40px;

}



.subtitle {

    text-align:center;
    color:#666;
    margin-bottom:40px;

}



.contact-grid {

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;

}



.card {

    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);

}



input,
textarea,
select {

    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;

}



textarea {

    height:140px;
    resize:none;

}



button {

    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#111827;
    color:white;
    cursor:pointer;
    font-size:16px;

}



.info {

    line-height:1.8;
    color:#555;

}



.icon {

    font-size:30px;

}



.message {

    text-align:center;
    margin-top:15px;

}



.success {

    color:green;

}



.error {

    color:red;

}



@media(max-width:800px){

.contact-grid{

grid-template-columns:1fr;

}

}

</style>


</head>


<body>


<header>

<div class="logo">
Halo Marketplace
</div>

</header>




<div class="container">


<h1>
Contact Us
</h1>


<div class="subtitle">
Need help? Our marketplace support team is here.
</div>




<div class="contact-grid">





<div class="card">


<h2>
Get In Touch
</h2>


<p class="info">

📧 Support: support@halomarketplace.com

<br>

🛒 Seller Support

<br>

💳 Payment Help

<br>

🔒 Account Security

<br>

🇨🇦 Serving Canadian buyers and sellers

</p>



<h3>
Business Hours
</h3>


<p class="info">

Monday - Friday

<br>

9:00 AM - 5:00 PM

</p>



</div>







<div class="card">


<h2>
Send Message
</h2>



<select id="subject">

<option>
General Question
</option>

<option>
Seller Support
</option>

<option>
Buyer Support
</option>

<option>
Payment Issue
</option>

<option>
Report Listing
</option>

</select>




<input
id="name"
placeholder="Your name"
/>




<input
id="email"
type="email"
placeholder="Email address"
/>




<textarea
id="message"
placeholder="How can we help?"
></textarea>




<button onclick="sendMessage()">

Send Message

</button>




<div id="status" class="message"></div>



</div>



</div>


</div>





<script>


function sendMessage(){


const status =
document.getElementById("status");



const name =
document.getElementById("name").value;


const email =
document.getElementById("email").value;


const message =
document.getElementById("message").value;



if(!name || !email || !message){


status.className =
"message error";


status.innerHTML =
"Please complete all fields.";


return;

}





// Connect this to Supabase table:
// contact_messages


status.className =
"message success";


status.innerHTML =
"Message sent! We will respond shortly.";



}





</script>


</body>

</html>
